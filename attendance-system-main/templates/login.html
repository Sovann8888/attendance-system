<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>QR Attendance – Professor Login</title>
<link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}"/>
</head>
<body class="auth-page">

<div class="auth-card">
  <div class="auth-logo">
    <div class="logo-icon">📋</div>
    <h1>QR Attendance</h1>
    <p class="auth-subtitle">Professor Portal</p>
  </div>

  {% if error %}
  <div class="alert alert-error">
    {{ error }}
    {% if unknown_email %}
    <div style="margin-top:.5rem;">
      <a href="/register?email={{ unknown_email }}">Register this email as a new professor →</a>
    </div>
    {% endif %}
  </div>
  {% endif %}

  <form method="POST" action="/login" class="auth-form">
    <div class="form-group">
      <label for="email">Professor Email</label>
      <input type="email" id="email" name="email" placeholder="you@camtech.edu.kh"
             value="{{ unknown_email or '' }}"
             required autocomplete="email" autofocus/>
    </div>
    <button type="submit" class="btn btn-primary btn-full">Send Login Code</button>
  </form>

  <p class="auth-hint">Each professor logs in with their own email — no password.<br/>
    We'll email you a 6-digit code to verify it's you.</p>
  <p class="auth-hint"><a href="/register">New professor? Create an account →</a></p>
</div>

</body>
</html>
