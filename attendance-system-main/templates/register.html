<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Register – QR Attendance</title>
<link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}"/>
</head>
<body class="auth-page">

<div class="auth-card">
  <div class="auth-logo">
    <div class="logo-icon">📋</div>
    <h1>QR Attendance</h1>
    <p class="auth-subtitle">New Professor Account</p>
  </div>

  {% if error %}
  <div class="alert alert-error">{{ error }}</div>
  {% endif %}

  <form method="POST" action="/register" class="auth-form">
    <div class="form-group">
      <label for="name">Full Name</label>
      <input type="text" id="name" name="name" placeholder="e.g. Professor Dara"
             value="{{ name or '' }}" maxlength="80" required autofocus/>
    </div>
    <div class="form-group">
      <label for="email">Email</label>
      <input type="email" id="email" name="email" placeholder="you@camtech.edu.kh"
             value="{{ email or '' }}" required autocomplete="email"/>
    </div>
    <button type="submit" class="btn btn-primary btn-full">Create Account &amp; Send Code</button>
  </form>

  <p class="auth-hint">Already have an account? <a href="/login">Log in →</a></p>
</div>

</body>
</html>
